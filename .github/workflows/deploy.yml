name: deploy
on:
  push:
    branches: [main, dev]
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 24 }
      - run: npm ci
      - run: npm run lint-config
      - run: npm test
  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WRANGLER_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      DB_NAME: ${{ github.ref == 'refs/heads/main' && 'artifact-share-prod' || 'artifact-share-preview' }}
    steps:
      # Fail fast with an actionable message instead of wrangler's generic non-interactive error.
      # Both are GitHub repo secrets (Settings → Secrets and variables → Actions); see
      # docs/deploy/SETUP.md §5 for the required API-token scopes.
      - name: preflight — deploy credentials present
        run: |
          missing=""
          [ -z "$CLOUDFLARE_API_TOKEN" ] && missing="CLOUDFLARE_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && missing="$missing CLOUDFLARE_ACCOUNT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secret(s):$missing — add under Settings → Secrets and variables → Actions (see docs/deploy/SETUP.md §5). The deploy job cannot run without them."
            exit 1
          fi
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 24 }
      - run: npm ci
      - run: npm run lint-config
      # Forward-only migrations, applied BEFORE the code deploy (spec §11). Never run from previews
      # of the other environment; never rolled back — schema stays compatible one release back.
      - run: npx wrangler d1 migrations apply "$DB_NAME" --env "$WRANGLER_ENV" --remote
      - run: npx wrangler deploy --env "$WRANGLER_ENV"
